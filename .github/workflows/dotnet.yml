name: .NET Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.3.1
        with:
          versionSpec: '6.6.x'
          
      - name: Calculate version (GitVersion)
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.3.1
        with:
          useConfigFile: false

      - name: Create Tag
        run: |
          git tag v${{ steps.gitversion.outputs.SemVer }}
          git push origin v${{ steps.gitversion.outputs.SemVer }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore
        run: dotnet restore src/Twia.StateMachine.slnx

      - name: Build
        run: dotnet build src/Twia.StateMachine.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test src/Twia.StateMachine.slnx --configuration Release --no-build --verbosity normal || true

      - name: Pack NuGet packages
        run: |
          dotnet pack src/Twia.StateMachine.slnx --configuration Release --no-build -o ./artifacts /p:PackageVersion=${{ steps.gitversion.outputs.NuGetVersionV2 }} /p:Version=${{ steps.gitversion.outputs.SemVer }}

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg
