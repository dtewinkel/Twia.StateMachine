name: .NET Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      Solution: Twia.StateMachine.slnx
      Configuration: Release
    defaults:
      run:
        working-directory: src
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.3.1
        with:
          versionSpec: '6.6.x'
          
      - name: Calculate version (GitVersion)
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.3.1

      - name: Create Tag
        if: github.ref == 'refs/heads/main'
        run: |
          $label = "v${{steps.gitversion.outputs.MajorMinorPatch}}${{ steps.gitversion.outputs.PreReleaseLabelWithDash }}"
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -a -f $label -m "Tag version ${label}"
          git push origin $label --force

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ${{ env.Solution }}

      # Even though IncludeSourceRevisionInInformationalVersion is set to false, the SourceRevisionId is 
      # still included in the InformationalVersion. Leaving IncludeSourceRevisionInInformationalVersion to 
      # default results in the SourceRevisionId being included twice in the InformationalVersion, which is not desired.
      - name: Build
        run: >-
          dotnet build ${{ env.Solution }}
          --configuration ${{ env.Configuration }}
          --no-restore
          -p:VersionPrefix=${{ steps.gitversion.outputs.MajorMinorPatch }}
          -p:VersionSuffix=${{ steps.gitversion.outputs.PreReleaseLabel }}
          -p:SourceRevisionId=${{ steps.gitversion.outputs.FullBuildMetaData }}
          -p:IncludeSourceRevisionInInformationalVersion=false

      - name: Test
        run: dotnet test --solution ${{ env.Solution }} --configuration ${{ env.Configuration }} --no-build

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: src/Twia.StateMachine/bin/${{ env.Configuration }}/*.nupkg
